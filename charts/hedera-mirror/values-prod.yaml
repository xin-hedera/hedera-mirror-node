# SPDX-License-Identifier: Apache-2.0

global:
  middleware: true

graphql:
  alertmanager:
    inhibitRules:
      enabled: true
  hpa:
    enabled: true
    minReplicas: 2
  podDisruptionBudget:
    enabled: true
  priorityClassName: medium
  prometheusRules:
    enabled: true
  serviceMonitor:
    enabled: true
  test:
    priorityClassName: high

grpc:
  hpa:
    enabled: true
    minReplicas: 2
  podDisruptionBudget:
    enabled: true
  priorityClassName: medium
  resources:
    requests:
      cpu: 1000m
      memory: 1024Mi
  serviceMonitor:
    enabled: true

importer:
  podMonitor:
    enabled: true
  priorityClassName: high
  replicas: 1

monitor:
  priorityClassName: medium
  serviceMonitor:
    enabled: true

postgresql:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  pgpool:
    priorityClassName: critical
    replicaCount: 2
  postgresql:
    priorityClassName: critical
    upgradeRepmgrExtension: false
    replicaCount: 2

redis:
  metrics:
    enabled: true
    sentinel:
      enabled: true
  replica:
    priorityClassName: critical
    replicaCount: 3

rest:
  hpa:
    minReplicas: 2
  monitor:
    test:
      priorityClassName: high
  podDisruptionBudget:
    enabled: true
  priorityClassName: medium
  serviceMonitor:
    enabled: true
  test:
    priorityClassName: high

restjava:
  hpa:
    enabled: true
    minReplicas: 2
  podDisruptionBudget:
    enabled: true
  priorityClassName: medium
  serviceMonitor:
    enabled: true
  test:
    priorityClassName: high

rosetta:
  alertmanager:
    inhibitRules:
      enabled: true
  hpa:
    minReplicas: 2
  podDisruptionBudget:
    enabled: true
  priorityClassName: medium
  prometheusRules:
    enabled: true
  serviceMonitor:
    enabled: true
  test:
    priorityClassName: high

stackgres:
  backup:
    enabled: true
    instances:
    - retention: 7
      cronSchedule: "45 22 * * *"
      compression: lz4
      useVolumeSnapshot: true
      fastVolumeSnapshot: true
      volumeSnapshotClass: zfs
      performance:
        uploadDiskConcurrency: 1
    objectStorage:
      endpoint: http://mirror-minio.common:9000
      bucket: stackgres-backup
      storageCredsSecretName: mirror-minio
      storageCredsNamespace: common
  coordinator:
    instances: 2
    resources:
      cpu: 8100m
      memory: 24Gi
      requests:
        containers:
          backup.create-backup:
            memory: 512Mi
            cpu: 1500m
          cluster-controller:
            cpu: 500m
          patroni:
            cpu: 8100m
          pgbouncer:
            cpu: 300m
          prometheus-postgres-exporter:
            cpu: 100m
    persistentVolume:
      size: 256Gi
      storageClass: zfs
  priorityClassName: critical
  worker:
    instances: 3
    replicasPerInstance: 1
    resources:
      cpu: 10250m
      memory: 40Gi
      requests:
        containers:
          backup.create-backup:
            memory: 512Mi
            cpu: 1500m
          cluster-controller:
            cpu: 500m
          patroni:
            cpu: 10250m
          pgbouncer:
            cpu: 300m
          prometheus-postgres-exporter:
            cpu: 100m
    persistentVolume:
      size: 300Gi
      storageClass: zfs

test:
  priorityClassName: high

web3:
  hpa:
    enabled: true
    gasUsed:
      enabled: true
    minReplicas: 2
  podDisruptionBudget:
    enabled: true
  priorityClassName: medium
  serviceMonitor:
    enabled: true
  test:
    priorityClassName: high
