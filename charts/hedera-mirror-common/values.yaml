global:
  namespaceOverride: ""
  security:
    allowInsecureImages: true

labels: {}

loki:
  backend:
    replicas: 0
  chunksCache:
    enabled: false
  compactor:
    replicas: 0
  deploymentMode: SingleBinary
  distributor:
    replicas: 0
  enabled: true
  gateway:
    enabled: false
  indexGateway:
    replicas: 0
  ingester:
    replicas: 0
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: 'filesystem'
    structuredConfig:
      compactor:
        delete_request_store: filesystem
        retention_enabled: true
      limits_config:
        retention_period: 1440h
      ruler:
        alertmanager_url: http://{{ .Release.Name }}-prometheus-alertmanager:9093
        enable_alertmanager_v2: true
        enable_api: true
        ring:
          kvstore:
            store: inmemory
        rule_path: /tmp/scratch
        storage:
          type: local
          local:
            directory: /rules
      schema_config:
        configs:
          - from: "2022-01-11"
            index:
              prefix: loki_index_
              period: 24h
            object_store: filesystem
            schema: v13
            store: tsdb
  lokiCanary:
    enabled: false
  monitoring:
    selfMonitoring:
      enabled: false
      grafanaAgent:
        installOperator: false
  querier:
    replicas: 0
  queryFrontend:
    replicas: 0
  queryScheduler:
    replicas: 0
  read:
    replicas: 0
  resultsCache:
    enabled: false
  ruler:
    replicas: 0
  rules:
    - name: rosetta
      rules:
        - alert: RosettaLogErrors
          annotations:
            description: "Logs for {{ $labels.cluster }}/{{ $labels.namespace }}/{{ $labels.pod }} have reached {{ $value }} error messages/s in a 1m period"
            summary: "High rate of log errors"
          expr: >
            sum(rate({component="rosetta"}
              | logfmt
              | level = "error" or level = "fatal"
            [1m])) by (cluster, namespace, pod) > 0.04
          for: 1m
          labels:
            severity: critical
  serviceMonitor:
    enabled: true
  singleBinary:
    persistence:
      enableStatefulSetAutoDeletePVC: true
      size: 250Gi
    replicas: 1
    resources:
      limits:
        cpu: 200m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
  test:
    enabled: false
  write:
    replicas: 0

minio:
  console:
    enabled: false
  defaultInitContainers:
    volumePermissions:
      image:
        repository: bitnamilegacy/os-shell
  enabled: false
  image:
    repository: bitnamilegacy/minio
  persistence:
    enabled: true
    size: 500Gi
    storageClass: premium-rwo
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 60s
      jobLabel: minio
  priorityClassName: critical
  provisioning:
    enabled: true
    buckets:
      - name: stackgres-backup
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi

networkPolicy:
  enabled: false

prometheus-adapter:
  enabled: true
  priorityClassName: low
  prometheus:
    url: http://{{ .Release.Name }}-prometheus-prometheus
  resources:
    limits:
      cpu: 50m
      memory: 100Mi
    requests:
      cpu: 25m
      memory: 50Mi
  rules:
    default: false
    custom:  # This is a custom rule which exposes (requests_per_second) from the prometheus adapter to be used by any Horizontal Pod Autoscaler.
      - seriesQuery: 'api_all_request_total{namespace!="",pod!=""}'
        resources:
          overrides:
            namespace:
              resource: "namespace"
            pod:
              resource: "pod"
        name:
          as: "requests_per_second"
        metricsQuery: "sum(rate(<<.Series>>{<<.LabelMatchers>>}[3m])) by (<<.GroupBy>>)"
      - seriesQuery: 'hiero_mirror_web3_evm_gas_used_total{application="web3",namespace!=""}'
        resources:
          overrides:
            namespace:
              resource: "namespace"
        name:
          as: "avg_evm_gas_used_per_second"
        metricsQuery: 'avg(rate(<<.Series>>{<<.LabelMatchers>>}[3m])) by (<<.GroupBy>>)'

prometheus:
  alertmanager:
    enabled: false
  coreDns:
    enabled: false
  enabled: true
  grafana:
    additionalDataSources:
      - name: Loki
        type: loki
        access: proxy
        url: http://{{ .Release.Name }}-loki:3100
        jsonData:
          maxLines: 500
    adminPassword: ""  # Randomly generated if left blank
    defaultDashboardsEnabled: true
    resources:
      limits:
        cpu: 300m
        memory: 500Mi
      requests:
        cpu: 150m
        memory: 75Mi
  kube-state-metrics:
    resources:
      limits:
        cpu: 20m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
  # We disable these exporters because they either don't work in GKE or produce too many time series
  kubeApiServer:
    enabled: false
  kubeControllerManager:
    enabled: false
  kubeDns:
    enabled: false
  kubeEtcd:
    enabled: false
  kubelet:
    # Disable these high cardinality metrics
    serviceMonitor:
      cAdvisorMetricRelabelings:
        - action: drop
          regex: container_(memory_failures_total|tasks_state)
          sourceLabels: [__name__]
      metricRelabelings:
        - action: drop
          regex: .*_bucket
          sourceLabels: [__name__]
  kubeProxy:
    enabled: false
  kubeScheduler:
    enabled: false
  prometheus-node-exporter:
    hostNetwork: false
    priorityClassName: critical
    prometheus:
      monitor:
        relabelings:
          - sourceLabels: [__meta_kubernetes_endpoint_node_name]
            targetLabel: node
    resources:
      limits:
        cpu: 100m
        memory: 50Mi
      requests:
        cpu: 50m
        memory: 20Mi
  prometheus:
    additionalPodMonitors:
      - name: traefik
        podMetricsEndpoints:
          - port: metrics
            path: /metrics
            interval: 15s
        selector:
          matchLabels:
            app.kubernetes.io/name: traefik
      - name: stackgres-collector
        podMetricsEndpoints:
          - honorLabels: true
            honorTimestamps: true
            interval: 30s
            metricRelabelings:
              - action: replace
                regex: ^.*(postgres-exporter)$
                replacement: $1
                sourceLabels: [job]
                targetLabel: job
              - action: keep
                regex: postgres-exporter;(mirror_node|);(mirror_node|)
                sourceLabels: [job, database, datname]
            scrapeTimeout: 30s
            path: /metrics
            port: prom-http
            scheme: https
            tlsConfig:
              ca:
                secret:
                  key: tls.crt
                  name: stackgres-collector
              serverName: stackgres-collector
        selector:
          matchLabels:
            app: StackGresConfig
            stackgres.io/collector: "true"
    prometheusSpec:
      podMonitorSelectorNilUsesHelmValues: false
      priorityClassName: high
      resources:
        limits:
          cpu: 750m
          memory: 4Gi
        requests:
          cpu: 250m
          memory: 1Gi
      retentionSize: 84GiB  # Capacity minus 16% so KubePersistentVolumeFillingUp alert doesn't fire
      ruleSelectorNilUsesHelmValues: false
      scrapeInterval: 30s
      serviceMonitorSelectorNilUsesHelmValues: false
      storageSpec:
        volumeClaimTemplate:
          spec:
            resources:
              requests:
                storage: 100Gi
      walCompression: true
  prometheusOperator:
    resources:
      limits:
        cpu: 100m
        memory: 200Mi
      requests:
        cpu: 50m
        memory: 50Mi

promtail:
  config:
    clients:
      - url: http://{{ .Release.Name }}-loki:3100/loki/api/v1/push
    snippets:
      pipelineStages:
        - cri: {}
        - multiline:
            firstline: '^\d{4}-\d{2}-\d{2}T\d{1,2}:\d{2}:\d{2}\.\d+(Z|[+-]\d{4}) '
  enabled: true
  priorityClassName: critical
  resources:
    limits:
      cpu: 125m
      memory: 150Mi
    requests:
      cpu: 50m
      memory: 50Mi
  serviceMonitor:
    enabled: true
  tolerations:
    - effect: NoSchedule
      operator: Exists

stackgres:
  cert:
    collectorSecretName: stackgres-collector
  collector:
    config:
      exporters:
        prometheus:
          metric_expiration: 2m
      processors:
        filter/drop_metrics:
          metrics:
            exclude:
              match_type: regexp
              metric_names:
                - ^go_.*$
                - ^node_file_system.*$
                - ^pg_index.*$
                - ^pg_long.*$
                - ^pg_roles.*$
                - ^pg_postmaster.*$
                - ^pg_scrape_collector.*$
                - ^pg_settings.*$
                - ^pg_slow_queries.*$
                - ^pg_stat_activity.*$
                - ^pg_stat.*_user.*$
                - ^pg_stat_progress.*$
                - ^pg_statements.*$
                - ^pg_table.*$
                - ^pg_total_relation_size_bytes.*$
                - ^pgbouncer_show_clients.*$
                - ^pgbouncer_show_databases.*$
                - ^process.*$
                - ^promhttp.*$
                - ^scrape.*$
      service:
        pipelines:
          metrics:
            processors:
              - filter/drop_metrics
            receivers:
              - prometheus
    name: stackgres-collector
    prometheusOperator:
      allowDiscovery: false
      monitors: []  # Configured as part of the prometheus chart to enable finer control over scrape endpoints
    resources:
      limits:
        cpu: "1500m"
        memory: "3Gi"
      requests:
        cpu: "500m"
        memory: "2Gi"
  enabled: false
  operator:
    image:
      name: gcr.io/mirrornode/stackgres-operator
testkube:
  enabled: false
  executor:
    image:
      registry: docker.io
      repository: grafana/k6
      tag: 0.58.0
  namespace: testkube
  prometheus:
    enabled: false
    password: ""
    serverUrl: ""
    username: ""
  test:
    config:
      rest:
        K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM: "true"
      restjava:
        K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM: "true"
      web3:
        K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM: "true"
    delay: 600s  # Delay duration between test suite steps. This needs to be at least 600s to match the pgbouncer server
                 # connection idle timeout, so that connections will be freed up for the next set of tests
    extraExecutionRequestVariables: {}
    gitBranch: ""  # Default to .Chart.AppVersion
    schedule: ""  # Cron schedule of the test suite, default to no schedule
    targets: []
    #  - namespace: ""
    #    release: mirror

traefik:
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: traefik
  deployment:
    kind: DaemonSet
  enabled: true
  globalArguments:
    - --api.insecure=true
  logs:
    access:
      enabled: true
      filters:
        minduration: 2s
        retryattempts: true
        statuscodes: 500-599
  metrics:
    prometheus:
      addServicesLabels: true
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  ports:
    web:
      forwardedHeaders:
        insecure: true  # Expose X-Forwarded-For header for tracing
      transport:
        respondingTimeouts:
          idleTimeout: 610s
    websecure:
      forwardedHeaders:
        insecure: true
      transport:
        respondingTimeouts:
          idleTimeout: 610s
      tls:
        enabled: true
  priorityClassName: critical
  resources:
    limits:
      cpu: 1500m
      memory: 2000Mi
    requests:
      cpu: 1000m
      memory: 500Mi
  service:
    spec: {}
    type: ClusterIP

zfs:
  alloy:
    enabled: false
  autoGrow:
    growPercent: 10
    intervalSeconds: 120
    maxStepGb: 50
    thresholdPercent: 80
  coordinator:
    initialDiskSize: 300GB
  enabled: false
  engines:
    local:
      lvm:
        enabled: false
      zfs:
        enabled: true
    replicated:
      mayastor:
        enabled: false
  # ZFS daemonset bootstrap configuration
  init:
    arcSizeGb: 2
    diskPrefix: citus
    image:
      pullPolicy: IfNotPresent
      registry: gcr.io
      repository: google.com/cloudsdktool/google-cloud-cli
      tag: slim
    l2ArcNvmeDeviceId: ""
    serviceAccount:
      name: zfs-service-account
      iAmName: sa-name@project.iam.gserviceaccount.com
  loki:
    enabled: false
  lvm-localpv:
    enabled: false
  mayastor:
    enabled: false
  openebs-crds:
    csi:
      volumeSnapshots:
        enabled: false
        keep: true  # Keep zfs resources when chart is uninstalled
  parameters:
    compression: zstd-6
    fstype: zfs
    poolname: zfspv-pool
    recordsize: 32k
  priorityClassName: critical
  worker:
    initialDiskSize: 350GB
  zfs-localpv:
    analytics:
      enabled: false
    zfsController:
      priorityClass:
        create: true
    zfsNode:
      additionalVolumes:
        node:
          hostPath:
            path: /
        scripts:
          configMap:
            name: "{{ .Release.Name }}-zfs-manager"
            defaultMode: 0744
      initContainers:
        label-wait:
          image: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
          imagePullPolicy: IfNotPresent
          command: ["/scripts/label-wait.sh"]
          env:
            - name: ROOT_MOUNT_DIR
              value: /node
          securityContext:
            privileged: true
          volumeMounts:
            - name: node
              mountPath: /node
            - name: scripts
              mountPath: /scripts
      nodeSelector:
        csi-type: zfs
      podLabels:
        component: openebs-zfs-node
      priorityClass:
        create: true
      tolerations:
        - effect: NoSchedule
          key: zfs
          operator: Equal
          value: "true"
