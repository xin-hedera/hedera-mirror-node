name: "Standalone Module UTs v2 Schema"

on:
  push:
    branches: [ v2-schema-gitactions, master, release/** ]
  pull_request:
    branches: [ master, release/** ]

jobs:
  maven-build:
    name: Maven build
    runs-on: ubuntu-latest
    env:
      MAVEN_CLI_OPTS: --batch-mode --no-transfer-progress --show-version -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      # If this run was triggered by a pull request event, then checkout
      # the head of the pull request instead of the merge commit.
      - run: git checkout HEAD^2
        if: ${{ github.event_name == 'pull_request' }}

      - name: Set up JDK 11
        uses: actions/setup-java@v1
        with:
          java-version: 11

      - name: Maven Package
        run: ./mvnw ${MAVEN_CLI_OPTS} package -DskipTests -Djib.skip -Ddocker.skip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Maven packages
        uses: actions/cache@v1
        with:
          key: ${{ runner.os }}-m2-${{ secrets.CACHE_VERSION }}-${{ hashFiles('**/pom.xml') }}
          path: ~/.m2
          restore-keys: ${{ runner.os }}-m2-${{ secrets.CACHE_VERSION }}-

  grpc-test:
    name: Grpc UTs
    runs-on: ubuntu-latest
    needs: maven-build
    env:
      MAVEN_CLI_OPTS: --batch-mode --no-transfer-progress --show-version -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn
      MAVEN_SPRING_OPTS: -Dspring.config.additional-location=file:./ -Dembedded.postgresql.docker-image=timescaledev/timescaledb-ha:pg12-ts2.0.0-rc3 -Dembedded.google.pubsub.enabled=false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      # If this run was triggered by a pull request event, then checkout
      # the head of the pull request instead of the merge commit.
      - run: git checkout HEAD^2
        if: ${{ github.event_name == 'pull_request' }}

      - name: Set up JDK 11
        uses: actions/setup-java@v1
        with:
          java-version: 11

      - name: Cache Maven packages
        uses: actions/cache@v1
        with:
          key: ${{ runner.os }}-m2-${{ secrets.CACHE_VERSION }}-${{ hashFiles('**/pom.xml') }}
          path: ~/.m2
          restore-keys: ${{ runner.os }}-m2-${{ secrets.CACHE_VERSION }}-

      - name: Configure config
        run: |
          cat >> ./application.yml \<< EOF
          db: &db
            db:
              host: 127.0.0.1
              port: 5432
              name: mirror_node_integration
              username: mirror_node
              password: mirror_node_pass
          hedera:
            mirror:
              importer:
                \<<: *db
              grpc:
                \<<: *db
          spring:
            flyway:
              baseline-version: 1.999.999
              locations: "filesystem:./src/main/resources/db/migration/v2,filesystem:../hedera-mirror-importer/src/main/resources/db/migration/v2"
              target: 2.999.999
            redis:
              url: redis://127.0.0.1:6379
          ---
          spring:
            profiles: pubsub
            cloud:
              gcp:
                pubsub:
                  projectId: my-project-id # Pubsub emulator's default values
                  emulator-host: 127.0.0.1:8085
          EOF

      - name: Grpc Maven Package
        run: ./mvnw ${MAVEN_CLI_OPTS} ${MAVEN_SPRING_OPTS} package -pl '!hedera-mirror-importer,-hedera-mirror-test'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  importer-test:
    name: Importer UTs
    runs-on: ubuntu-latest
    needs: maven-build
    env:
      MAVEN_CLI_OPTS: --batch-mode --no-transfer-progress --show-version -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn
      MAVEN_SPRING_OPTS: -Dspring.config.additional-location=file:./ -Dembedded.postgresql.docker-image=timescaledev/timescaledb-ha:pg12-ts2.0.0-rc3 -Dembedded.google.pubsub.enabled=false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      # If this run was triggered by a pull request event, then checkout
      # the head of the pull request instead of the merge commit.
      - run: git checkout HEAD^2
        if: ${{ github.event_name == 'pull_request' }}

      - name: Set up JDK 11
        uses: actions/setup-java@v1
        with:
          java-version: 11

      - name: Cache Maven packages
        uses: actions/cache@v1
        with:
          key: ${{ runner.os }}-m2-${{ secrets.CACHE_VERSION }}-${{ hashFiles('**/pom.xml') }}
          path: ~/.m2
          restore-keys: ${{ runner.os }}-m2-${{ secrets.CACHE_VERSION }}-

      - name: Configure config
        run: |
          cat >> ./application.yml \<< EOF
          db: &db
            db:
              host: 127.0.0.1
              port: 5432
              name: mirror_node_integration
              username: mirror_node
              password: mirror_node_pass
          hedera:
            mirror:
              importer:
                \<<: *db
              grpc:
                \<<: *db
          spring:
            flyway:
              baseline-version: 1.999.999
              locations: "filesystem:./src/main/resources/db/migration/v2,filesystem:../hedera-mirror-importer/src/main/resources/db/migration/v2"
              target: 2.999.999
            redis:
              url: redis://127.0.0.1:6379
          ---
          spring:
            profiles: pubsub
            cloud:
              gcp:
                pubsub:
                  projectId: my-project-id # Pubsub emulator's default values
                  emulator-host: 127.0.0.1:8085
          EOF

      - name: Import Maven Package
        run: ./mvnw ${MAVEN_CLI_OPTS} ${MAVEN_SPRING_OPTS} package -pl '!hedera-mirror-grpc,-hedera-mirror-test'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  rest-test:
    name: REST UTs
    runs-on: ubuntu-latest
    env:
      working-directory: ./hedera-mirror-rest

    services:
      timescaledb:
        image: timescaledev/timescaledb-ha:pg12-ts2.0.0-rc3
        env:
          POSTGRES_DB: mirror_node_integration
          POSTGRES_PASSWORD: mirror_node_pass
          POSTGRES_USER: mirror_node

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Install npm dependencies
        run: npm ci
        working-directory: ${{env.working-directory}}

      - name: Cache Node packages
        uses: actions/cache@v1
        with:
          path: ~/.npm
            key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
            restore-keys: ${{ runner.os }}-node-

      - name: Run tests
        run: npm test
        working-directory: ${{env.working-directory}}
        env:
          TEST_S3_HOST: "127.0.0.1"
