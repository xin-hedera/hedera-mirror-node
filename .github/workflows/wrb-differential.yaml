# SPDX-License-Identifier: Apache-2.0

name: WRB Differential

on:
  pull_request:
    branches:
      - "main"
    paths:
      - ".github/workflows/wrb-differential.yaml"
  push:
    tags:
      - "v*"
  schedule:
    - cron: "0 23 * * *"

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  LC_ALL: C.UTF-8

jobs:
  differential:
    runs-on: hiero-mirror-node-linux-large
    timeout-minutes: 50
    env:
      BLOCK_NODE_VERSION: v0.35.1
      CONSENSUS_NODE_VERSION: v0.75.0-rc.5
      HELM_RELEASE_NAME: mirror-1
      SOLO_CLUSTER_NAME: test
      SOLO_NAMESPACE: mirror
      SOLO_CLUSTER_SETUP_NAMESPACE: solo
      SOLO_DEPLOYMENT: solo-deployment
      SOLO_VERSION: v0.77.0
    permissions:
      pull-requests: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "4.0.5"

      - name: Setup Kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: ${{ env.SOLO_CLUSTER_NAME }}
          kubectl_version: v1.34.0
          version: v0.31.0

      - name: Install JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: 25

      - name: Install Solo CLI via npm
        run: npm install -g @hiero-ledger/solo@${SOLO_VERSION}

      - name: Determine base and tag
        timeout-minutes: 15
        run: |
          set -ex

          TAG=$(sed -nE 's/^version: (.+)$/\1/p' charts/hedera-mirror/Chart.yaml)
          BASE=""
          TRIGGERED_BY_TAG=false
          if [[ "$TAG" != *SNAPSHOT ]]; then
            BASE="v$TAG"
            # The dereferenced tag corresponds to the commit the annotated tag refers to
            DEREFERENCED_TAG="v${TAG}^{}"
            git ls-remote --tags origin "${DEREFERENCED_TAG}" | grep $(git rev-parse HEAD) && TRIGGERED_BY_TAG=true \
              || true
          fi

          echo "BASE=${BASE}" >> $GITHUB_ENV
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "TRIGGERED_BY_TAG=${TRIGGERED_BY_TAG}" >> $GITHUB_ENV

          if [[ "$TRIGGERED_BY_TAG" == "true" ]]; then
            # wait for images becoming ready if it's a tagged commit
            for module in grpc importer monitor rest rest-java test web3; do
              while ! docker manifest inspect "gcr.io/mirrornode/hedera-mirror-$module:$TAG" >/dev/null 2>&1; do
                sleep 10
              done
            done
          fi

      - name: Find changed modules
        id: changeset
        if: env.TRIGGERED_BY_TAG != 'true' && github.event_name != 'schedule'
        uses: step-security/paths-filter@5c5241b8233e77b55b9046daf88f1cb7560281de # v4.0.1
        with:
          base: ${{ env.BASE }}
          filters: |
            grpc:
            - 'grpc/**'
            importer:
            - 'importer/**'
            monitor:
            - 'monitor/**'
            rest:
            - 'rest/!(monitoring)?(/**)'
            rest-java:
            - 'rest-java/**'
            test:
            - 'test/**'
            web3:
            - 'web3/**'

      - name: Setup Gradle
        if: steps.changeset.outcome != 'skipped' && steps.changeset.outputs.changes != '[]'
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v4

      - name: Login to Docker Hub
        uses: step-security/docker-login-action@164e21d7e52229904128e2f946001cb88278c33d # v4.2.0
        if: vars.DOCKERHUB_USERNAME != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build images
        if: steps.changeset.outcome != 'skipped' && steps.changeset.outputs.changes != '[]'
        run: |
          set -ex
          echo '${{ steps.changeset.outputs.changes }}' | jq -r '.[]' | while read module; do
            ./gradlew ":${module}:dockerBuild" -x :rest:monitoring:dockerBuild -PimageTag="${TAG}"
            kind load docker-image "gcr.io/mirrornode/hedera-mirror-${module}:${TAG}" -n "${SOLO_CLUSTER_NAME}"
          done

      - name: Install yq
        env:
          BINARY: yq_linux_amd64
          TARGET: /home/runner/.local/bin
          VERSION: v4.53.3
        run: |
          mkdir -p "${TARGET}"
          cd "${TARGET}"
          curl -sL https://github.com/mikefarah/yq/releases/download/${VERSION}/${BINARY}.tar.gz --output - | tar -xvz
          mv ${BINARY} yq

      - name: Setup Solo Cluster
        run: |
          set -ex

          cat <<EOF > block-node.yaml
          blockNode:
            config:
              ROSTER_BOOTSTRAP_RSA_MIRROR_NODE_BASE_URL: http://${HELM_RELEASE_NAME}-restjava.${SOLO_NAMESPACE}.svc.cluster.local
          plugins:
            names: "facility-messaging,block-access-service,health,server-status,stream-publisher,stream-subscriber,verification,blocks-file-historic,blocks-file-recent,backfill,roster-bootstrap-rsa"
          EOF

          yq '(.. | select(tag == "!!str")) |= envsubst' .github/workflows/resources/mirror-block-node.yaml > mirror.yaml
          yq -i '. *= load(".github/workflows/resources/mirror.yaml")' mirror.yaml
          yq -i 'with(.importer.env; '\
          '.HIERO_MIRROR_IMPORTER_PARSER_RECORD_ENTITY_PERSIST_TRANSACTIONBYTES="true", '\
          '.HIERO_MIRROR_IMPORTER_PARSER_RECORD_ENTITY_PERSIST_TRANSACTIONRECORDBYTES="true")' mirror.yaml

          solo cluster-ref config connect --cluster-ref kind-"${SOLO_CLUSTER_NAME}" \
            --context kind-"${SOLO_CLUSTER_NAME}"
          solo deployment config create --deployment "${SOLO_DEPLOYMENT}" --namespace "${SOLO_NAMESPACE}"
          solo deployment cluster attach --deployment "${SOLO_DEPLOYMENT}" --cluster-ref kind-"${SOLO_CLUSTER_NAME}" \
            --num-consensus-nodes 1
          solo cluster-ref config setup --cluster-ref kind-"${SOLO_CLUSTER_NAME}"
          # block node
          solo block node add --deployment "${SOLO_DEPLOYMENT}" --cluster-ref kind-"${SOLO_CLUSTER_NAME}" \
            --chart-version "${BLOCK_NODE_VERSION}" --release-tag "${CONSENSUS_NODE_VERSION}" -f block-node.yaml
          # consensus node
          solo keys consensus generate --gossip-keys --tls-keys --deployment "${SOLO_DEPLOYMENT}" -i node1
          solo consensus network deploy --deployment "${SOLO_DEPLOYMENT}" --release-tag "${CONSENSUS_NODE_VERSION}"
          solo consensus node setup --deployment "${SOLO_DEPLOYMENT}" -i node1 --release-tag "${CONSENSUS_NODE_VERSION}"
          solo consensus node start --deployment "${SOLO_DEPLOYMENT}" -i node1

          # remove block-node pod before deploying mirror node to avoid running into the situation that block node waits
          # too long for the RSA roster from /network/nodes REST api and ends up skipping some blocks at the beginning
          echo "Removing block-node pod"
          kubectl scale sts block-node-1 -n "${SOLO_NAMESPACE}" --replicas 0
          kubectl wait pod -n "${SOLO_NAMESPACE}" --for=delete -l block-node.hiero.com/type=block-node --timeout=300s
          echo "Removed block-node pod"

          helm dependency update charts/hedera-mirror
          DISABLE_IMPORTER_SPRING_PROFILES=true solo mirror node add --cluster-ref kind-"${SOLO_CLUSTER_NAME}" \
            --deployment "${SOLO_DEPLOYMENT}" \
            -f mirror.yaml --mirror-node-chart-dir ./charts --pinger --enable-ingress
          APP_VERSION=$(helm ls -n "${SOLO_NAMESPACE}" -o json \
            | jq -r '.[] | select (.chart | test("hedera-mirror-.*")) | .app_version')
          echo "Installed hedera-mirror chart version $APP_VERSION"

          echo "Scale up block-node sts"
          kubectl scale sts block-node-1 -n "${SOLO_NAMESPACE}" --replicas 1
          kubectl wait sts block-node-1 -n "${SOLO_NAMESPACE}" --for=jsonpath='{.status.readyReplicas}'=1 --timeout=300s
          echo "Scaled up block-node sts"

      - name: Run acceptance tests
        timeout-minutes: 10
        run: |
          helm test "${HELM_RELEASE_NAME}" -n "${SOLO_NAMESPACE}" --logs \
            --timeout 10m | tee output_log.txt

      - name: Switch to Ingest Recordstream Files
        timeout-minutes: 10
        run: |
          set -euo pipefail

          # scale down importer so no more writes to the database
          kubectl scale deployment "${HELM_RELEASE_NAME}-importer" -n "${SOLO_NAMESPACE}" --replicas=0
          kubectl wait -n "${SOLO_NAMESPACE}" --for=delete -l app.kubernetes.io/name=importer --timeout=300s pod

          LAST_TIMESTAMP=$(curl -s 'http://localhost:38081/api/v1/transactions?limit=1' | \
            jq -r '.transactions[0].consensus_timestamp')

          .github/workflows/resources/backup_and_reset_database.sh "${SOLO_NAMESPACE}"

          # reconfig importer to ingest recordstream files
          kubectl -n "${SOLO_NAMESPACE}" set env deployment "${HELM_RELEASE_NAME}-importer" SPRING_PROFILES_ACTIVE-
          kubectl scale deployment "${HELM_RELEASE_NAME}-importer" -n "${SOLO_NAMESPACE}" --replicas=1
          kubectl rollout status deployment "${HELM_RELEASE_NAME}-importer" -n "${SOLO_NAMESPACE}" --timeout=300s

          CURRENT_TIMESTAMP=$(curl -s 'http://localhost:38081/api/v1/transactions?limit=1' | \
            jq -r '.transactions[0].consensus_timestamp // 0.0')
          until [[ "${CURRENT_TIMESTAMP}" = "${LAST_TIMESTAMP}" || "${CURRENT_TIMESTAMP}" > "${LAST_TIMESTAMP}" ]]
          do
            echo "Current timestamp ${CURRENT_TIMESTAMP} is behind the timestamp of the previous run ${LAST_TIMESTAMP}"
            sleep 5
            CURRENT_TIMESTAMP=$(curl -s 'http://localhost:38081/api/v1/transactions?limit=1' | \
              jq -r '.transactions[0].consensus_timestamp // 0.0')
          done

          echo "importer has synced to ${CURRENT_TIMESTAMP}"
          kubectl scale deployment "${HELM_RELEASE_NAME}-importer" -n "${SOLO_NAMESPACE}" --replicas=0
          kubectl wait pod -n "${SOLO_NAMESPACE}" --for=delete -l app.kubernetes.io/name=importer --timeout=300s

      - name: Run Verification
        run: |
          set -euo pipefail

          SERVICE_NAME=$(kubectl get service -l app.kubernetes.io/name=postgres -n "${SOLO_NAMESPACE}" -o json | \
            jq -r '.items[] | select (.spec.clusterIP != "None") | .metadata.name')
          kubectl port-forward service/"${SERVICE_NAME}" -n "${SOLO_NAMESPACE}" 5432:5432 &

          export HIERO_MIRROR_IMPORTER_DB_OWNERPASSWORD=$(kubectl get secret mirror-passwords -n \
            "${SOLO_NAMESPACE}" -o json | jq -r '.data.HIERO_MIRROR_IMPORTER_DB_OWNERPASSWORD' | base64 -d)
          export HIERO_MIRROR_IMPORTER_DB_PASSWORD=$(kubectl get secret mirror-passwords -n \
            "${SOLO_NAMESPACE}" -o json | jq -r '.data.HIERO_MIRROR_IMPORTER_DB_PASSWORD' | base64 -d)
          export WRB_TEST_ENABLED=true
          ./gradlew :importer:test --tests '*WrbVerificationTest' --info

      - name: Show Pod Logs on Failure
        continue-on-error: true
        if: ${{ failure() }}
        run: |
          echo "--------------------------------------------------"
          echo "Workflow failed. Collecting logs for debugging..."
          echo "--------------------------------------------------"

          echo "--- Describing all pods in namespace ${SOLO_NAMESPACE} ---"
          kubectl describe pods -n "${SOLO_NAMESPACE}" || echo "Could not describe pods"

          echo "--- Fetching logs for all pods in namespace ${SOLO_NAMESPACE} ---"
          for pod in $(kubectl get pods -n "${SOLO_NAMESPACE}" -o name); do
            if [ -n "$pod" ]; then
              echo "--- Logs for pod: $pod ---"
              kubectl logs "$pod" -n "${SOLO_NAMESPACE}" --all-containers=true --tail=10000 || echo "Could not get logs for pod $pod"
            fi
          done
