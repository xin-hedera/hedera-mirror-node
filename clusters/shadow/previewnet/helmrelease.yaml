apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mirror
  namespace: previewnet
spec:
  chart:
    spec:
      chart: hedera-mirror
      sourceRef:
        kind: HelmRepository
        name: hedera-mirror-node
      valuesFiles:
        - values.yaml
        - values-prod.yaml
      version: '0.154.0-rc1'
  dependsOn:
    - name: mirror
      namespace: common
  driftDetection:
    mode: warn
  install:
    crds: CreateReplace
  interval: 90s
  test:
    enable: true
    timeout: 25m
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
  valuesFrom:
    - kind: Secret
      name: mirror
  values:
    graphql:
      enabled: false
    grpc:
      hpa:
        minReplicas: 1
    importer:
      env:
        HIERO_MIRROR_IMPORTER_NETWORK: "PREVIEWNET"
        HIERO_MIRROR_IMPORTER_PARSER_RECORD_ENTITY_PERSIST_ENTITYNFTTRANSACTIONS: "true"
        HIERO_MIRROR_IMPORTER_PARSER_RECORD_SIDECAR_ENABLED: "true"
        HIERO_MIRROR_IMPORTER_STARTBLOCKNUMBER: "-1"
        SPRING_PROFILES_ACTIVE: "blocknode"
      image:
        registry: docker.io
        repository: xin323/importer
        tag: 0.154.0-acb3247cde
    monitor:
      enabled: false
      env:
        HIERO_MIRROR_MONITOR_NETWORK: "PREVIEWNET"
      prometheusRules:
        MonitorPublishErrors:
          enabled: false
        MonitorPublishLatency:
          enabled: false
        MonitorSubscribeLatency:
          enabled: false
    postgresql:
      enabled: false
    rest:
      hpa:
        minReplicas: 1
      monitor:
        enabled: false
    restjava:
      hpa:
        minReplicas: 1
    test:
      enabled: false
    web3:
      env:
        HIERO_MIRROR_WEB3_EVM_NETWORK: 'PREVIEWNET'
      hpa:
        minReplicas: 1
