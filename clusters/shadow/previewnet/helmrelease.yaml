apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mirror
  namespace: previewnet
spec:
  chart:
    spec:
      chart: hedera-mirror
      sourceRef:
        kind: HelmRepository
        name: hedera-mirror-node
      valuesFiles:
        - values.yaml
        - values-prod.yaml
      version: '0.155.1'
  dependsOn:
    - name: mirror
      namespace: common
  driftDetection:
    mode: enabled
  install:
    crds: CreateReplace
  interval: 90s
  test:
    enable: true
    timeout: 25m
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
  valuesFrom:
    - kind: Secret
      name: mirror
  values:
    graphql:
      enabled: false
    grpc:
      hpa:
        minReplicas: 1
    importer:
      config:
        hiero:
          mirror:
            importer:
              block:
                cutover:
                  enabled: true
                  firstStage:
                    enabled: true
              network: PREVIEWNET
              parser:
                record:
                  entity:
                    persist:
                      entityNftTransactions: true
                  sidecar:
                    enabled: true
    monitor:
      enabled: false
      env:
        HIERO_MIRROR_MONITOR_NETWORK: "PREVIEWNET"
      prometheusRules:
        MonitorPublishErrors:
          enabled: false
        MonitorPublishLatency:
          enabled: false
        MonitorSubscribeLatency:
          enabled: false
    postgresql:
      enabled: false
    rest:
      hpa:
        minReplicas: 1
      monitor:
        enabled: false
    restjava:
      hpa:
        minReplicas: 1
    test:
      enabled: false
    web3:
      env:
        HIERO_MIRROR_WEB3_EVM_NETWORK: 'PREVIEWNET'
      hpa:
        minReplicas: 1
